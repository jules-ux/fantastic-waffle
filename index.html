<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wafelverkoop Tablet</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #faf5ef;
        }

        * {
    box-sizing: border-box;
    /* Schakel tekstselectie uit voor alle browsers */
    -webkit-user-select: none; /* Safari & Chrome op iOS */
    -moz-user-select: none;    /* Firefox */
    -ms-user-select: none;     /* IE/Edge */
    user-select: none;         /* Standaard */
    
    /* Schakel het systeem-menu bij lang indrukken uit (belangrijk voor iOS) */
    -webkit-touch-callout: none; 
}

/* Zorg dat input velden WEL invulbaar blijven, anders kun je niet typen! */
input, textarea {
    -webkit-user-select: text !important;
    user-select: text !important;
}

        html, body {
    touch-action: manipulation;
}

/* Specifiek voor de knoppen, aangezien daar vaak snel achter elkaar op geklikt wordt */
.item-card, button {
    touch-action: manipulation;
}
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #fff7ed 0%, #f7ede6 45%, #f1e5db 100%);
            color: #3d3430;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            user-select: none;
        }

        .container {
            width: min(100%, 600px);
            margin: auto;
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(92, 58, 25, 0.12);
            border: 1px solid rgba(226, 126, 34, 0.14);
        }

        .header {
            text-align: center;
            margin-bottom: 22px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.9rem;
            color: #d35400;
        }

        .header p {
            margin: 10px auto 0;
            max-width: 450px;
            font-size: 0.98rem;
            color: #6d5344;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 22px;
        }

        .item-card {
            background: linear-gradient(180deg, #fff5ec 0%, #fff0e1 100%);
            border: 1px solid rgba(231, 126, 34, 0.2);
            border-radius: 20px;
            padding: 18px;
            cursor: pointer;
            position: relative;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            display: grid;
            gap: 8px;
        }

        .item-card:hover {
            transform: translateY(-2px);
            border-color: rgba(231, 126, 34, 0.35);
            box-shadow: 0 16px 30px rgba(227, 127, 43, 0.18);
        }

        .item-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #6f3f24;
        }

        .item-price {
            font-size: 0.96rem;
            color: #9f724f;
        }

        .item-count {
            position: absolute;
            top: 16px;
            right: 16px;
            min-width: 36px;
            height: 36px;
            border-radius: 999px;
            background: #d35400;
            color: white;
            display: grid;
            place-items: center;
            font-weight: 800;
            box-shadow: 0 8px 18px rgba(211, 84, 0, 0.22);
        }

        .total-panel {
            background: #e67e22;
            color: white;
            border-radius: 20px;
            padding: 18px 20px;
            text-align: center;
            margin-bottom: 22px;
        }

        .total-panel div:first-child {
            opacity: 0.9;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .total-panel strong {
            font-size: 2rem;
            line-height: 1;
            display: block;
        }

        .inputs {
            display: grid;
            gap: 14px;
            margin-bottom: 10px;
        }

        .inputs label {
            font-size: 0.9rem;
            color: #6b4d3d;
            font-weight: 600;
        }

        .inputs input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid #e2cab3;
            background: #fff8f2;
            font-size: 1rem;
            color: #4d372e;
            outline: none;
        }

        .inputs input:focus {
            border-color: #d98a49;
            box-shadow: 0 0 0 4px rgba(230, 126, 34, 0.12);
        }

        button.primary {
            width: 100%;
            border: none;
            border-radius: 18px;
            padding: 16px;
            background: #27ae60;
            color: white;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        button.primary:hover:not(:disabled) {
            background: #229154;
        }

        button.primary:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .message {
            text-align: center;
            min-height: 24px;
            margin-top: 10px;
            color: #3d3430;
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.34);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 20;
        }

        .menu-overlay.open {
            display: flex;
        }

        .menu {
            width: min(460px, 100%);
            border-radius: 24px;
            background: #fff;
            padding: 22px;
            box-shadow: 0 32px 90px rgba(91, 55, 21, 0.22);
            position: relative;
        }

        .menu-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: #f5e7dc;
            color: #6f3f24;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .menu h3 {
            margin: 0 0 12px;
            font-size: 1.2rem;
            color: #d35400;
        }

        .menu .quantity {
            font-size: 2.25rem;
            font-weight: 800;
            text-align: center;
            margin: 12px 0 10px;
            color: #3d3430;
        }

        .menu .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .menu .controls button,
        .menu .bottom button {
            flex: 1;
            border: none;
            border-radius: 16px;
            padding: 14px 12px;
            font-size: 0.98rem;
            font-weight: 700;
            cursor: pointer;
        }

        .menu .controls button {
            background: #fff3e8;
            color: #7e4d2d;
        }

        .menu .bottom {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .menu .bottom button {
            background: #e67e22;
            color: white;
        }

        .menu .field {
            display: grid;
            gap: 8px;
        }

        .menu .field label {
            font-size: 0.9rem;
            color: #6b4d3d;
            font-weight: 600;
        }

        .menu .field input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid #e2cab3;
            background: #fff8f2;
            font-size: 1rem;
            color: #4d372e;
        }

        @media (max-width: 520px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h1>🧇 Wafelverkoop</h1>
            <p>Klik op een item om het toe te voegen. Houd een item even ingedrukt om het aantal handmatig aan te passen of te wissen.</p>
        </div>

        <div class="grid" id="itemGrid"></div>

        <div class="total-panel">
            <div>Bestelling totaal</div>
            <strong id="totaal">€0,00</strong>
        </div>

        <div class="inputs">
            <label for="naam">Naam</label>
            <input type="text" id="naam" placeholder="Naam klant" required>

            <label for="email">E-mailadres</label>
            <input type="email" id="email" placeholder="E-mailadres" required>

            <label for="adres">Adres</label>
            <input type="text" id="adres" placeholder="Straat, huisnummer, postcode">
        </div>

        <button class="primary" id="saveBtn" onclick="stuurData()">Bestelling opslaan</button>
        <p class="message" id="msg"></p>
    </div>
</div>

<div class="menu-overlay" id="menuOverlay">
    <div class="menu" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
        <button class="menu-close" onclick="closeMenu()" aria-label="Sluit">×</button>
        <h3 id="menuTitle">Bereken aantal</h3>
        <div class="field"><span id="menuItemLabel" style="font-weight:700; color:#5b3b29;"></span></div>
        <p class="quantity" id="menuCount">0</p>

        <div class="controls">
            <button type="button" onclick="changeCount(-1)">-1</button>
            <button type="button" onclick="changeCount(1)">+1</button>
        </div>

        <div class="field">
            <label for="menuManualCount">Handmatig aantal</label>
            <input type="number" id="menuManualCount" min="0" step="1">
        </div>

        <div class="bottom">
            <button type="button" onclick="applyManualCount()">Toepassen</button>
            <button type="button" onclick="clearItem()">Alles leeg</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwEq8X_WMyDOiwCM2KbDfFArJTNjIle62GerelEiEDHrcFO4daUxJqOEeVF5AbJ2m9N/exec';

    const items = [
        { id: 'v', name: 'Vanille', price: 7 },
        { id: 's', name: 'Suikervrij', price: 10 },
        { id: 'm', name: 'Mix', price: 8 },
        { id: 'c', name: 'Choco', price: 7 },
        { id: 'f', name: 'Frangipane', price: 8 }
    ];

    const order = items.reduce((acc, item) => ({ ...acc, [item.id]: 0 }), {});
    let longPressTimer = null;
    let activeItem = null;

    const itemGrid = document.getElementById('itemGrid');
    const totalEl = document.getElementById('totaal');
    const menuOverlay = document.getElementById('menuOverlay');
    const menuItemLabel = document.getElementById('menuItemLabel');
    const menuCount = document.getElementById('menuCount');
    const menuManualCount = document.getElementById('menuManualCount');

    function formatCurrency(value) {
        return '€' + value.toFixed(2).replace('.', ',');
    }

    function renderItems() {
        itemGrid.innerHTML = '';
        items.forEach(item => {
            const button = document.createElement('button');
            button.className = 'item-card';
            button.type = 'button';
            button.dataset.id = item.id;
            button.innerHTML = `
                <div class="item-title">${item.name}</div>
                <div class="item-price">€${item.price.toFixed(2).replace('.', ',')}</div>
                <div class="item-count" id="count-${item.id}">${order[item.id]}</div>
            `;

            button.addEventListener('click', () => incrementItem(item.id));
            button.addEventListener('mousedown', startLongPress);
            button.addEventListener('touchstart', startLongPress, { passive: true });
            button.addEventListener('mouseup', cancelLongPress);
            button.addEventListener('mouseleave', cancelLongPress);
            button.addEventListener('touchend', cancelLongPress);
            button.addEventListener('contextmenu', event => {
                event.preventDefault();
                openMenu(item.id);
            });

            itemGrid.appendChild(button);
        });
    }

    function incrementItem(id) {
        order[id] += 1;
        updateItem(id);
        updateTotal();
    }

    function updateItem(id) {
        const countEl = document.getElementById(`count-${id}`);
        if (countEl) countEl.innerText = order[id];
    }

    function updateTotal() {
        const total = items.reduce((sum, item) => sum + order[item.id] * item.price, 0);
        totalEl.innerText = formatCurrency(total);
    }

    function startLongPress(event) {
        const id = event.currentTarget.dataset.id;
        longPressTimer = setTimeout(() => openMenu(id), 500);
    }

    function cancelLongPress() {
        clearTimeout(longPressTimer);
        longPressTimer = null;
    }

    function openMenu(id) {
        activeItem = items.find(item => item.id === id);
        if (!activeItem) return;
        menuItemLabel.innerText = `${activeItem.name} — €${activeItem.price.toFixed(2).replace('.', ',')}`;
        menuManualCount.value = order[id];
        menuCount.innerText = order[id];
        menuOverlay.classList.add('open');
    }

    function closeMenu() {
        menuOverlay.classList.remove('open');
        activeItem = null;
    }

    function changeCount(delta) {
        if (!activeItem) return;
        order[activeItem.id] = Math.max(0, order[activeItem.id] + delta);
        menuCount.innerText = order[activeItem.id];
        menuManualCount.value = order[activeItem.id];
    }

    function applyManualCount() {
        if (!activeItem) return;
        const value = parseInt(menuManualCount.value, 10);
        order[activeItem.id] = Number.isNaN(value) ? order[activeItem.id] : Math.max(0, value);
        updateItem(activeItem.id);
        updateTotal();
        closeMenu();
    }

    function clearItem() {
        if (!activeItem) return;
        order[activeItem.id] = 0;
        updateItem(activeItem.id);
        updateTotal();
        closeMenu();
    }

    function stuurData() {
        const btn = document.getElementById('saveBtn');
        const msg = document.getElementById('msg');
        btn.disabled = true;
        msg.innerText = '⏳ Bezig met opslaan...';

        const payload = {
            naam: document.getElementById('naam').value,
            email: document.getElementById('email').value,
            adres: document.getElementById('adres').value,
            ...items.reduce((acc, item) => ({ ...acc, [item.name.toLowerCase()]: order[item.id] }), {})
        };

        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
            .then(() => {
                msg.innerText = '✅ Gelukt! Bestelling is verzonden.';
                resetOrder();
                btn.disabled = false;
            })
            .catch(() => {
                msg.innerText = '❌ Fout! Probeer opnieuw.';
                btn.disabled = false;
            });
    }

    function resetOrder() {
        items.forEach(item => {
            order[item.id] = 0;
            updateItem(item.id);
        });
        document.getElementById('naam').value = '';
        document.getElementById('email').value = '';
        document.getElementById('adres').value = '';
        updateTotal();
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderItems();
        updateTotal();
        document.addEventListener('keydown', event => {
            if (event.key === 'Escape') closeMenu();
        });
    });
</script>
</body>
</html>
